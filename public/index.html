<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Woolworths Innovation Investment Committee</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="student">
    <main class="shell">
      <section class="masthead">
        <p class="eyebrow">Woolworths IT Innovation Portfolio</p>
        <h1>Innovation Investment Committee</h1>
        <p class="lede">Choose the investment you would prioritise in each committee round.</p>
      </section>

      <form id="voteForm" class="rounds" aria-live="polite"></form>

      <section id="done" class="done" hidden>
        <h2>Vote submitted</h2>
        <p>Your committee choices have been counted.</p>
        <button id="editVote" class="secondary" type="button">Edit my vote</button>
      </section>
    </main>

    <script src="/student.js"></script>
  </body>
</html>
