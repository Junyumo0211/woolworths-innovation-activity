<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Class Result | Woolworths Innovation Activity</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="screen">
    <main class="screenShell">
      <header class="screenHeader">
        <p class="eyebrow">Live class result</p>
        <h1>Innovation Investment Committee</h1>
      </header>

      <section class="screenResult">
        <div class="screenMetric">
          <span id="screenResponseCount">0</span>
          <p>student responses</p>
        </div>
        <div>
          <h2 id="screenAnalysisTitle">Waiting for votes</h2>
          <p id="screenAnalysisBody">The class analysis will appear after students submit their choices.</p>
        </div>
      </section>

      <section class="screenBars" id="screenBars"></section>
    </main>

    <script src="/screen.js"></script>
  </body>
</html>
